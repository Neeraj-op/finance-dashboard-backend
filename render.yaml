databases:
  - name: finance-postgres
    databaseName: finance_db
    user: finance_user
    plan: free

services:
  - type: web
    name: finance-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: finance-backend.onrender.com
      - key: DJANGO_SETTINGS_MODULE
        value: config.production_settings
      - key: DATABASE_URL
        fromDatabase:
          name: finance-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.4